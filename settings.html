<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings | KJIR Interior Designs Inc.</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .settings-wrap {
      max-width: 700px;
      margin: 3rem auto;
      padding: 0 1.5rem 5rem;
    }

    .settings-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, .08);
      padding: 2.5rem;
    }

    .settings-card h2 {
      font-size: 1.4rem;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #e2e8f0;
    }

    .settings-section {
      margin-bottom: 2.5rem;
    }

    .settings-section h3 {
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: #64748b;
      margin-bottom: 1.25rem;
    }

    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: .9rem 0;
      border-bottom: 1px solid #f1f5f9;
    }

    .settings-row:last-child {
      border-bottom: none;
    }

    .settings-label {
      font-size: .92rem;
      font-weight: 600;
      color: #0f172a;
    }

    .settings-desc {
      font-size: .78rem;
      color: #64748b;
      margin-top: .15rem;
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #e2e8f0;
      border-radius: 24px;
      cursor: pointer;
      transition: .3s;
    }

    .toggle-slider:before {
      content: '';
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: .3s;
    }

    .toggle input:checked+.toggle-slider {
      background: #cc0000;
    }

    .toggle input:checked+.toggle-slider:before {
      transform: translateX(20px);
    }

    .btn-save {
      background: linear-gradient(135deg, #cc0000, #6a0dad);
      color: #fff;
      border: none;
      padding: .75rem 2rem;
      border-radius: 50px;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 1rem;
    }

    .btn-danger {
      background: transparent;
      color: #cc0000;
      border: 2px solid #cc0000;
      padding: .65rem 1.5rem;
      border-radius: 50px;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
    }

    .settings-field label {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #64748b;
      display: block;
      margin-bottom: .35rem;
    }

    .settings-field input {
      width: 100%;
      padding: .65rem .9rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: .92rem;
      font-family: inherit;
      outline: none;
    }

    .settings-field input:focus {
      border-color: #cc0000;
    }

    .settings-field {
      margin-bottom: 1rem;
    }

    .not-logged {
      text-align: center;
      padding: 4rem 2rem;
    }
  </style>
</head>

<body>

  <div class="top-bar">
    <div class="top-bar-left">
      <span class="utility-info"><strong>888-944-6313</strong> • Call in Orders Only • Call 24/7 • Live Operator</span>
    </div>
    <div class="top-bar-right">
      <a href="contact-us.html">Contact</a>
      <a href="suggest-feature.html">Suggest Feature</a>
      <button class="auth-trigger-btn" onclick="openAuthModal('login')">Login / Sign Up</button>
    </div>
  </div>

  <header class="main-header">
    <div class="header-container">
      <div class="logo"><a href="index.html"><img src="logo-new.jpeg" alt="KJIR Interior Designs Inc."></a></div>
      <nav class="secondary-nav">
        <div class="secondary-nav-container">
          <ul class="nav-links">
            <li><a href="index.html">HOME</a></li>
            <li class="has-dropdown">
              <a href="#">WORK FORCE <span class="dropdown-arrow">▾</span></a>
              <ul class="dropdown-menu">
                <li><a href="career-move.html">Career Move</a></li>
                <li><a href="property-mgmt.html">Property Mgmt Crew</a></li>
                <li><a href="bid-projects.html">Bid Projects</a></li>
                <li><a href="work-completed.html">Work Completed by KJRID</a></li>
              </ul>
            </li>
            <li><a href="about-us.html">ABOUT</a></li>
          </ul>
        </div>
      </nav>
      <div class="header-actions">
        <a href="index.html#parts" class="parts-highlight">10M+ PARTS</a>
      </div>
    </div>
  </header>

  <div class="settings-wrap">
    <div id="settingsContent"></div>
  </div>

  <div id="authModal" class="auth-modal" onclick="if(event.target===this)closeAuthModal()">
    <div class="auth-modal-box">
      <button class="auth-close" onclick="closeAuthModal()" aria-label="Close">&times;</button>
      <div class="auth-logo"><img src="logo-new.jpeg" alt="KJIR Interior Designs"></div>
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Login</button>
        <button class="auth-tab" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
      </div>
      <form id="formLogin" class="auth-form" onsubmit="handleLogin(event)">
        <div class="auth-field"><label>Account Type</label>
          <select id="loginType" required>
            <option value="">— Select your account type —</option>
            <option value="sales_team">Sales Team Login</option>
            <option value="parts">Parts Login</option>
            <option value="bids">Bids Login</option>
            <option value="property">Property Management Login</option>
            <option value="grad">Graduate Login</option>
          </select>
        </div>
        <div class="auth-field"><label>Email or Username</label>
          <input type="text" id="loginIdentifier" placeholder="Enter email or username" required
            autocomplete="username">
        </div>
        <div class="auth-field"><label>Password</label>
          <div class="auth-password-wrap">
            <input type="password" id="loginPassword" placeholder="Enter password" required
              autocomplete="current-password">
            <span class="auth-eye" onclick="togglePassword('loginPassword',this)">&#9679;</span>
          </div>
        </div>
        <div class="auth-options">
          <label class="auth-remember"><input type="checkbox"> Remember me</label>
          <a href="#" class="auth-forgot">Forgot password?</a>
        </div>
        <div id="loginError" class="auth-error" style="display:none;"></div>
        <button type="submit" class="auth-submit" id="loginBtn">
          <span class="auth-btn-text">Login</span><span class="auth-spinner" style="display:none;">...</span>
        </button>
      </form>
      <form id="formSignup" class="auth-form" style="display:none;" onsubmit="handleSignup(event)">
        <div class="auth-field"><label>Account Type <span class="req">*</span></label>
          <select id="signupType" required onchange="toggleSignupFields()">
            <option value="">— Select your account type —</option>
            <option value="sales_team">Sales Team Login</option>
            <option value="parts">Parts Login</option>
            <option value="bids">Bids Login</option>
            <option value="property">Property Management Login</option>
            <option value="grad">Graduate Login</option>
          </select>
        </div>
        <div class="auth-field"><label>Username <span class="req">*</span></label><input type="text" id="signupUsername"
            required autocomplete="username"></div>
        <div class="auth-field"><label>Email <span class="req">*</span></label><input type="email" id="signupEmail"
            required autocomplete="email"></div>
        <div class="auth-field"><label>Mobile Number</label><input type="tel" id="signupPhone" autocomplete="tel"></div>
        <div class="auth-field" id="companyField" style="display:none;"><label>Company Name</label><input type="text"
            id="signupCompany"></div>
        <div class="auth-field" id="instructorField" style="display:none;"><label>Instructor Name</label><input
            type="text" id="signupInstructor"></div>
        <div class="auth-field"><label>Password <span class="req">*</span></label>
          <div class="auth-password-wrap">
            <input type="password" id="signupPassword" required autocomplete="new-password">
            <span class="auth-eye" onclick="togglePassword('signupPassword',this)">&#9679;</span>
          </div>
        </div>
        <div class="auth-field"><label>Confirm Password <span class="req">*</span></label>
          <div class="auth-password-wrap">
            <input type="password" id="signupConfirm" required autocomplete="new-password">
            <span class="auth-eye" onclick="togglePassword('signupConfirm',this)">&#9679;</span>
          </div>
        </div>
        <div id="signupError" class="auth-error" style="display:none;"></div>
        <button type="submit" class="auth-submit" id="signupBtn">
          <span class="auth-btn-text">Create Account</span><span class="auth-spinner" style="display:none;">...</span>
        </button>
      </form>
    </div>
  </div>

  <script src="assets/js/bunji.js"></script>
  <script>
    const BACKEND = 'https://kjr-backend.onrender.com';
    function openAuthModal(tab) { document.getElementById('authModal').classList.add('open'); document.body.style.overflow = 'hidden'; switchTab(tab || 'login'); }
    function closeAuthModal() { document.getElementById('authModal').classList.remove('open'); document.body.style.overflow = ''; }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeAuthModal(); });
    function switchTab(tab) { const l = tab === 'login'; document.getElementById('tabLogin').classList.toggle('active', l); document.getElementById('tabSignup').classList.toggle('active', !l); document.getElementById('formLogin').style.display = l ? 'flex' : 'none'; document.getElementById('formSignup').style.display = l ? 'none' : 'flex'; clearErrors(); }
    function clearErrors() { ['loginError', 'signupError'].forEach(id => { const e = document.getElementById(id); if (e) { e.style.display = 'none'; e.textContent = ''; }; }); }
    function showError(id, msg) { const e = document.getElementById(id); if (e) { e.textContent = msg; e.style.display = 'block'; } }
    function togglePassword(fId, eye) { const i = document.getElementById(fId); const s = i.type === 'password'; i.type = s ? 'text' : 'password'; eye.textContent = s ? 'Hide' : 'Show'; }
    function toggleSignupFields() { const t = document.getElementById('signupType').value; document.getElementById('companyField').style.display = ['sales_team', 'parts', 'bids', 'property'].includes(t) ? 'block' : 'none'; document.getElementById('instructorField').style.display = t === 'grad' ? 'block' : 'none'; }
    function setLoading(id, on) { const b = document.getElementById(id); b.querySelector('.auth-btn-text').style.display = on ? 'none' : 'inline'; b.querySelector('.auth-spinner').style.display = on ? 'inline' : 'none'; b.disabled = on; }
    async function handleLogin(e) { e.preventDefault(); clearErrors(); const loginType = document.getElementById('loginType').value; const identifier = document.getElementById('loginIdentifier').value.trim(); const password = document.getElementById('loginPassword').value; if (!loginType) return showError('loginError', 'Please select your account type.'); setLoading('loginBtn', true); try { const r = await fetch(BACKEND + '/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ identifier, password, loginType }) }); const d = await r.json(); if (!r.ok) throw new Error(d.errors?.[0]?.msg || 'Login failed'); localStorage.setItem('kjr_token', d.token); localStorage.setItem('kjr_user', JSON.stringify({ ...d.user, loginType })); closeAuthModal(); updateAuthButton({ ...d.user, loginType }); renderSettings(); } catch (err) { showError('loginError', err.message); } finally { setLoading('loginBtn', false); } }
    async function handleSignup(e) { e.preventDefault(); clearErrors(); const loginType = document.getElementById('signupType').value; const username = document.getElementById('signupUsername').value.trim(); const email = document.getElementById('signupEmail').value.trim(); const password = document.getElementById('signupPassword').value; const confirm = document.getElementById('signupConfirm').value; const phone = document.getElementById('signupPhone').value.trim(); const companyName = document.getElementById('signupCompany').value.trim(); const instructorName = document.getElementById('signupInstructor').value.trim(); if (!loginType) return showError('signupError', 'Please select an account type.'); if (password !== confirm) return showError('signupError', 'Passwords do not match.'); setLoading('signupBtn', true); try { const r = await fetch(BACKEND + '/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ loginType, username, email, password, phone, companyName, instructorName }) }); const d = await r.json(); if (!r.ok) throw new Error(d.errors?.[0]?.msg || 'Registration failed'); localStorage.setItem('kjr_token', d.token); localStorage.setItem('kjr_user', JSON.stringify({ ...d.user, loginType })); closeAuthModal(); updateAuthButton({ ...d.user, loginType }); renderSettings(); } catch (err) { showError('signupError', err.message); } finally { setLoading('signupBtn', false); } }
    function updateAuthButton(user){
      const wrap=document.querySelector('.top-bar-right');
      const old=document.querySelector('.user-menu-wrap');if(old)old.remove();
      const trigger=document.querySelector('.auth-trigger-btn');
      const TYPE_LABELS={sales_team:'Sales Team',parts:'Parts',bids:'Bids',property:'Property Management',grad:'Graduate'};
      if(user){
        if(trigger)trigger.style.display='none';
        const menu=document.createElement('div');menu.className='user-menu-wrap';
        menu.innerHTML='<button class="user-menu-btn">'+user.username+' <span class="user-arrow">&#9660;</span></button>'
          +'<div class="user-dropdown">'
          +'<div class="user-dropdown-header"><div class="user-dropdown-name">'+user.username+'</div>'
          +'<div class="user-dropdown-type">'+(TYPE_LABELS[user.loginType]||user.loginType)+'</div></div>'
          +'<div class="user-dropdown-items">'
          +'<a class="user-dropdown-item" href="profile.html"><i class="item-icon">&#128100;</i> Profile</a>'
          +'<a class="user-dropdown-item" href="order-tracking.html"><i class="item-icon">&#128230;</i> Order History &amp; Tracking</a>'
          +'<a class="user-dropdown-item" href="invoice.html"><i class="item-icon">&#128203;</i> Invoice</a>'
          +'<a class="user-dropdown-item" href="payment.html"><i class="item-icon">&#128179;</i> Payment</a>'
          +'<div class="user-dropdown-divider"></div>'
          +'<a class="user-dropdown-item" href="settings.html"><i class="item-icon">&#9881;</i> Settings</a>'
          +'<div class="user-dropdown-divider"></div>'
          +'<button class="user-dropdown-item logout-item" onclick="logout()"><i class="item-icon">&#10148;</i> Logout</button>'
          +'</div></div>';
        if(wrap)wrap.appendChild(menu);
        window.dispatchEvent(new Event('kjr-login'));
      }else{
        if(trigger){trigger.style.display='';trigger.textContent='Login / Sign Up';trigger.onclick=()=>openAuthModal('login');}
      }
    } else { btn.textContent = 'Login / Sign Up'; btn.onclick = () => openAuthModal('login'); btn.title = ''; } }
    function logout() { if (!confirm('Logout?')) return; localStorage.removeItem('kjr_token'); localStorage.removeItem('kjr_user'); updateAuthButton(null); window.location.href = 'index.html'; }

    function renderSettings() {
      const user = JSON.parse(localStorage.getItem('kjr_user') || 'null');
      const el = document.getElementById('settingsContent');
      if (!user) {
        el.innerHTML = `<div class="settings-card not-logged"><h2>Please log in to access settings</h2><button class="btn-save" onclick="openAuthModal('login')">Login</button></div>`;
        return;
      }
      el.innerHTML = `
        <div class="settings-card">
          <h2>Account Settings</h2>
          <div class="settings-section">
            <h3>Profile Information</h3>
            <div class="settings-field"><label>Username</label><input type="text" id="setUsername" value="${user.username}" readonly></div>
            <div class="settings-field"><label>Email</label><input type="text" id="setEmail" value="${user.email}" readonly></div>
          </div>
          <div class="settings-section">
            <h3>Notifications</h3>
            <div class="settings-row">
              <div><div class="settings-label">Order Updates</div><div class="settings-desc">Get notified when your order status changes</div></div>
              <label class="toggle"><input type="checkbox" checked><span class="toggle-slider"></span></label>
            </div>
            <div class="settings-row">
              <div><div class="settings-label">Promotions &amp; Offers</div><div class="settings-desc">Receive special deals and pricing updates</div></div>
              <label class="toggle"><input type="checkbox"><span class="toggle-slider"></span></label>
            </div>
            <div class="settings-row">
              <div><div class="settings-label">Bid Alerts</div><div class="settings-desc">Notify me about new bid projects in my area</div></div>
              <label class="toggle"><input type="checkbox" checked><span class="toggle-slider"></span></label>
            </div>
          </div>
          <div class="settings-section">
            <h3>Security</h3>
            <div class="settings-row">
              <div><div class="settings-label">Change Password</div><div class="settings-desc">Update your account password</div></div>
              <button class="btn-danger" onclick="alert('Please call 888-944-6313 to change your password.')">Change</button>
            </div>
          </div>
          <div class="settings-section">
            <h3>Danger Zone</h3>
            <div class="settings-row">
              <div><div class="settings-label">Log Out</div><div class="settings-desc">Sign out from this device</div></div>
              <button class="btn-danger" onclick="logout()">Log Out</button>
            </div>
          </div>
        </div>`;
    }

    (function () { const u = JSON.parse(localStorage.getItem('kjr_user') || 'null'); if (u) updateAuthButton(u); renderSettings(); })();
  </script>
</body>

</html>
